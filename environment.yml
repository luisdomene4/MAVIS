# MAVIS — conda environment (pinned to the environment used on the cluster).
# Versions mirror the real embedding/analysis environment; transitive system
# libraries are omitted for readability (conda/pip resolve them automatically).
#
# NOTE on torch: the pinned wheels are CUDA 12.1 builds. Install them from the
# PyTorch CUDA index, e.g.:
#   pip install torch==2.5.1 torchvision==0.20.1 torchaudio==2.5.1 \
#       --index-url https://download.pytorch.org/whl/cu121
# (or drop the index for a CPU-only build of the analysis stack).
name: mavis
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - ffmpeg=8.0.1          # video/audio decoding
  - ipykernel             # to run the analysis notebooks
  - jupyterlab
  - pip:
      # --- deep learning / encoders ---
      - torch==2.5.1
      - torchvision==0.20.1
      - torchaudio==2.5.1
      - transformers==5.8.0
      - accelerate==1.13.0
      - bitsandbytes==0.49.2
      - tokenizers==0.22.2
      - safetensors==0.7.0
      - huggingface-hub==1.14.0
      - qwen-vl-utils==0.0.14
      # --- ASR (Whisper transcripts) ---
      - faster-whisper==1.2.1
      - ctranslate2==4.7.1
      # --- Gemini Embedding 2 (API) ---
      - google-genai==2.0.1
      # --- data / analysis ---
      - numpy==2.2.6
      - pandas==2.3.3
      - scikit-learn==1.7.2
      - scipy==1.15.3
      - matplotlib==3.10.9
      # --- video / image I/O ---
      - opencv-python-headless==4.13.0.92
      - av==17.0.1
      - decord==0.6.0
      - pillow==12.1.1
      - onnxruntime==1.23.2
      # --- utils ---
      - pyyaml==6.0.3
      - requests==2.33.1
      - tqdm==4.67.3
      - rich==15.0.0
      - typer==0.25.1
      - pydantic==2.13.4
      - tenacity==9.1.4
      - protobuf==7.34.1
      - sympy==1.13.1
